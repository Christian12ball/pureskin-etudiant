[build]
builder = "NIXPACKS"

[deploy]
healthcheckPath = "/"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[[services]]
name = "pureskin-frontend"

[services.variables]
NODE_ENV = "production"
NEXT_PUBLIC_API_URL = "${{BACKEND_URL}}"
NEXT_PUBLIC_BASE_URL = "${{RAILWAY_PUBLIC_DOMAIN}}"
PORT = "3000"
